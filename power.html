<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>看盤 · 我的持股監測</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#12141b;
    --panel:#1b1e29;
    --panel-2:#232733;
    --paper:#edeff3;
    --muted:#8a90a6;
    --rise:#e6483c;   /* 台股慣例: 漲為紅 */
    --fall:#2fa86c;   /* 台股慣例: 跌為綠 */
    --flat:#8a90a6;
    --gold:#d4a94f;
    --hair:rgba(237,239,243,0.08);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:
      radial-gradient(1200px 600px at 10% -10%, #1a1e2c 0%, transparent 60%),
      var(--ink);
    color:var(--paper);
    font-family:'Noto Sans TC', sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  .serif{font-family:'Noto Serif TC', serif;}

  /* ---------- Ticker tape (signature element) ---------- */
  .ticker-wrap{
    background:#0d0f15;
    border-bottom:1px solid var(--hair);
    overflow:hidden;
    white-space:nowrap;
    padding:9px 0;
  }
  .ticker-track{
    display:inline-flex;
    animation:scroll-left 28s linear infinite;
  }
  .ticker-wrap:hover .ticker-track{animation-play-state:paused;}
  @keyframes scroll-left{
    from{transform:translateX(0);}
    to{transform:translateX(-50%);}
  }
  .tick{
    display:inline-flex;
    align-items:baseline;
    gap:8px;
    padding:0 22px;
    font-size:13px;
    letter-spacing:.02em;
  }
  .tick + .tick{border-left:1px solid var(--hair);}
  .tick .code{color:var(--muted);}
  .tick .px{font-weight:700;}
  .tick.up .px, .tick.up .chg{color:var(--rise);}
  .tick.down .px, .tick.down .chg{color:var(--fall);}
  .tick.flat .px, .tick.flat .chg{color:var(--flat);}

  /* ---------- Layout ---------- */
  .wrap{max-width:1080px;margin:0 auto;padding:32px 20px 80px;}
  header.top{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:28px;
  }
  h1{
    font-family:'Noto Serif TC', serif;
    font-weight:900;
    font-size:30px;
    margin:0 0 4px;
    letter-spacing:.02em;
  }
  .sub{color:var(--muted);font-size:13px;}
  .today{
    text-align:right;
    font-size:13px;
    color:var(--muted);
  }
  .today .d{color:var(--paper);font-size:15px;font-weight:700;}

  .summary{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:1px;
    background:var(--hair);
    border:1px solid var(--hair);
    border-radius:14px;
    overflow:hidden;
    margin-bottom:22px;
  }
  .sum-cell{
    background:var(--panel);
    padding:18px 20px;
  }
  .sum-label{font-size:12px;color:var(--muted);margin-bottom:6px;}
  .sum-value{font-size:22px;font-weight:700;}
  .sum-value.pos{color:var(--rise);}
  .sum-value.neg{color:var(--fall);}

  .toolbar{
    display:flex;
    gap:10px;
    margin-bottom:22px;
    flex-wrap:wrap;
  }
  button{
    font-family:inherit;
    cursor:pointer;
    border:none;
    border-radius:9px;
    padding:10px 16px;
    font-size:13px;
    font-weight:700;
    transition:transform .12s ease, opacity .12s ease;
  }
  button:active{transform:scale(.97);}
  button:focus-visible{outline:2px solid var(--gold); outline-offset:2px;}
  .btn-primary{background:var(--gold);color:#1a1508;}
  .btn-primary:hover{opacity:.9;}
  .btn-ghost{background:var(--panel-2);color:var(--paper);border:1px solid var(--hair);}
  .btn-ghost:hover{background:#2a2f3d;}
  .btn-danger{background:transparent;color:var(--fall);border:1px solid rgba(47,168,108,.35);}
  .btn-small{padding:6px 11px;font-size:12px;border-radius:7px;}

  .status-line{font-size:12px;color:var(--muted);margin:-10px 0 20px;min-height:16px;}
  .status-line.err{color:var(--rise);}
  .status-line.ok{color:var(--fall);}

  .empty{
    border:1px dashed var(--hair);
    border-radius:14px;
    padding:48px 24px;
    text-align:center;
    color:var(--muted);
  }
  .empty b{color:var(--paper);display:block;font-size:16px;margin-bottom:6px;}

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px, 1fr));
    gap:14px;
    margin-bottom:36px;
  }
  .card{
    background:var(--panel);
    border:1px solid var(--hair);
    border-radius:14px;
    padding:16px;
    position:relative;
  }
  .card-head{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:10px;
  }
  .card-code{font-size:12px;color:var(--muted);}
  .card-name{font-size:16px;font-weight:700;}
  .card-actions{display:flex;gap:6px;}
  .icon-btn{
    background:transparent;
    border:none;
    color:var(--muted);
    font-size:14px;
    padding:2px 5px;
    border-radius:5px;
  }
  .icon-btn:hover{color:var(--paper);background:var(--panel-2);}

  .price-row{display:flex;align-items:baseline;gap:10px;margin-bottom:2px;}
  .price{font-size:24px;font-weight:700;}
  .chg{font-size:13px;font-weight:700;}
  .price-row.up .price, .price-row.up .chg{color:var(--rise);}
  .price-row.down .price, .price-row.down .chg{color:var(--fall);}
  .price-row.flat .price, .price-row.flat .chg{color:var(--flat);}

  .pnl-row{font-size:12.5px;color:var(--muted);margin-bottom:10px;}
  .pnl-row .amt.pos{color:var(--rise);font-weight:700;}
  .pnl-row .amt.neg{color:var(--fall);font-weight:700;}

  canvas.spark{display:block;width:100%;height:44px;margin-bottom:10px;}

  .alert-badge{
    display:inline-flex;
    align-items:center;
    gap:5px;
    font-size:11.5px;
    padding:4px 9px;
    border-radius:100px;
    background:rgba(212,169,79,.14);
    color:var(--gold);
    border:1px solid rgba(212,169,79,.35);
    margin-bottom:8px;
  }
  .thresholds{font-size:11.5px;color:var(--muted);display:flex;gap:12px;}

  .manual-entry{
    margin-top:10px;
    padding-top:10px;
    border-top:1px solid var(--hair);
    display:flex;
    gap:6px;
  }
  .manual-entry input{
    width:0;
    flex:1;
    background:var(--panel-2);
    border:1px solid var(--hair);
    color:var(--paper);
    border-radius:7px;
    padding:6px 9px;
    font-size:12.5px;
    font-family:inherit;
  }

  section.trend{
    background:var(--panel);
    border:1px solid var(--hair);
    border-radius:14px;
    padding:20px;
  }
  section.trend h2{
    font-family:'Noto Serif TC',serif;
    font-size:16px;
    margin:0 0 4px;
  }
  section.trend .hint{font-size:12px;color:var(--muted);margin-bottom:14px;}
  canvas#trendChart{width:100%;height:160px;display:block;}

  /* ---------- Modal ---------- */
  .overlay{
    position:fixed;inset:0;
    background:rgba(8,9,13,.72);
    display:none;
    align-items:center;
    justify-content:center;
    padding:20px;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--panel);
    border:1px solid var(--hair);
    border-radius:16px;
    padding:24px;
    width:100%;
    max-width:400px;
  }
  .modal h3{font-family:'Noto Serif TC',serif;margin:0 0 16px;font-size:18px;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;}
  .field input{
    width:100%;
    background:var(--panel-2);
    border:1px solid var(--hair);
    color:var(--paper);
    border-radius:8px;
    padding:9px 11px;
    font-size:14px;
    font-family:inherit;
  }
  .field input:focus-visible{outline:2px solid var(--gold);outline-offset:1px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;}
  .field-hint{font-size:11px;color:var(--muted);margin-top:4px;}

  footer.note{
    margin-top:28px;
    font-size:11.5px;
    color:var(--muted);
    line-height:1.7;
  }

  @media (prefers-reduced-motion: reduce){
    .ticker-track{animation:none;}
  }
</style>
</head>
<body>

<div class="ticker-wrap"><div class="ticker-track" id="tickerTrack"></div></div>

<div class="wrap">
  <header class="top">
    <div>
      <h1>看盤台</h1>
      <div class="sub">已購買股票 · 每日監測</div>
    </div>
    <div class="today">
      <div class="d" id="todayLabel">—</div>
      <div>依最近一次更新的收盤價計算</div>
    </div>
  </header>

  <div class="summary">
    <div class="sum-cell">
      <div class="sum-label">總市值</div>
      <div class="sum-value mono" id="sumValue">NT$ 0</div>
    </div>
    <div class="sum-cell">
      <div class="sum-label">總成本</div>
      <div class="sum-value mono" id="sumCost">NT$ 0</div>
    </div>
    <div class="sum-cell">
      <div class="sum-label">總損益</div>
      <div class="sum-value mono" id="sumPnl">NT$ 0 (0.0%)</div>
    </div>
  </div>

  <div class="toolbar">
    <button class="btn-primary" id="btnFetch">更新今日股價</button>
    <button class="btn-ghost" id="btnAdd">＋ 新增持股</button>
  </div>
  <div class="status-line" id="statusLine"></div>

  <div id="emptyState" class="empty" style="display:none;">
    <b>還沒有任何持股</b>
    新增你已經買進的股票代號、股數與成本，開始每日監測。
  </div>

  <div class="grid" id="cardsGrid"></div>

  <section class="trend">
    <h2>總資產走勢</h2>
    <div class="hint">每次按下「更新今日股價」都會記錄一筆快照，累積使用天數愈多，走勢愈完整。</div>
    <canvas id="trendChart"></canvas>
  </section>

  <footer class="note">
    股價資料嘗試從台灣證券交易所公開資訊擷取；若瀏覽器無法連線取得，可在卡片下方手動輸入今日收盤價。所有資料僅儲存在你的帳號中，僅供個人參考，不構成投資建議。
  </footer>
</div>

<!-- Add / Edit modal -->
<div class="overlay" id="overlay">
  <div class="modal">
    <h3 id="modalTitle">新增持股</h3>
    <div class="field-row">
      <div class="field">
        <label for="fCode">股票代號</label>
        <input id="fCode" placeholder="2330" inputmode="numeric">
      </div>
      <div class="field">
        <label for="fName">股票名稱</label>
        <input id="fName" placeholder="台積電">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="fShares">持有股數</label>
        <input id="fShares" placeholder="1000" inputmode="decimal">
      </div>
      <div class="field">
        <label for="fCost">平均成本 (每股)</label>
        <input id="fCost" placeholder="600" inputmode="decimal">
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label for="fHigh">目標價提醒 (選填)</label>
        <input id="fHigh" placeholder="例如 700" inputmode="decimal">
      </div>
      <div class="field">
        <label for="fLow">停損價提醒 (選填)</label>
        <input id="fLow" placeholder="例如 550" inputmode="decimal">
      </div>
    </div>
    <div class="field-hint" id="formError" style="color:var(--rise);"></div>
    <div class="modal-actions">
      <button class="btn-ghost" id="btnCancel">取消</button>
      <button class="btn-primary" id="btnSave">儲存</button>
    </div>
  </div>
</div>

<script>
(function(){
  "use strict";

  const els = {
    tickerTrack: document.getElementById('tickerTrack'),
    todayLabel: document.getElementById('todayLabel'),
    sumValue: document.getElementById('sumValue'),
    sumCost: document.getElementById('sumCost'),
    sumPnl: document.getElementById('sumPnl'),
    statusLine: document.getElementById('statusLine'),
    emptyState: document.getElementById('emptyState'),
    cardsGrid: document.getElementById('cardsGrid'),
    trendChart: document.getElementById('trendChart'),
    overlay: document.getElementById('overlay'),
    modalTitle: document.getElementById('modalTitle'),
    fCode: document.getElementById('fCode'),
    fName: document.getElementById('fName'),
    fShares: document.getElementById('fShares'),
    fCost: document.getElementById('fCost'),
    fHigh: document.getElementById('fHigh'),
    fLow: document.getElementById('fLow'),
    formError: document.getElementById('formError'),
    btnFetch: document.getElementById('btnFetch'),
    btnAdd: document.getElementById('btnAdd'),
    btnCancel: document.getElementById('btnCancel'),
    btnSave: document.getElementById('btnSave'),
  };

  let holdings = [];          // [{id, code, name, shares, avgCost, alertHigh, alertLow}]
  let priceHistory = {};      // { code: [{date:'YYYY-MM-DD', price:Number}, ...] }
  let editingId = null;
  let portfolioHistory = [];  // [{date, value}]

  function todayStr(){
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
  }

  function fmtMoney(n){
    const sign = n < 0 ? '-' : '';
    return sign + 'NT$ ' + Math.round(Math.abs(n)).toLocaleString('en-US');
  }

  function fmtPct(n){
    return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
  }

  // ---------- Storage ----------
  async function loadAll(){
    try{
      const h = await window.storage.get('portfolio', false);
      holdings = (h && h.value) ? JSON.parse(h.value).holdings || [] : [];
    }catch(e){ holdings = []; }
    try{
      const p = await window.storage.get('price-history', false);
      priceHistory = (p && p.value) ? JSON.parse(p.value) : {};
    }catch(e){ priceHistory = {}; }
    try{
      const t = await window.storage.get('portfolio-trend', false);
      portfolioHistory = (t && t.value) ? JSON.parse(t.value) : [];
    }catch(e){ portfolioHistory = []; }
  }

  async function saveHoldings(){
    try{ await window.storage.set('portfolio', JSON.stringify({holdings}), false); }
    catch(e){ setStatus('持股資料儲存失敗，請稍後再試。', true); }
  }

  async function savePriceHistory(){
    try{ await window.storage.set('price-history', JSON.stringify(priceHistory), false); }
    catch(e){ setStatus('股價紀錄儲存失敗，請稍後再試。', true); }
  }

  async function savePortfolioTrend(){
    try{ await window.storage.set('portfolio-trend', JSON.stringify(portfolioHistory), false); }
    catch(e){ /* non-critical */ }
  }

  function setStatus(msg, isErr){
    els.statusLine.textContent = msg || '';
    els.statusLine.className = 'status-line' + (isErr ? ' err' : (msg ? ' ok' : ''));
  }

  // ---------- Price helpers ----------
  function historyFor(code){
    return priceHistory[code] || [];
  }
  function latestEntry(code){
    const h = historyFor(code);
    return h.length ? h[h.length-1] : null;
  }
  function prevEntry(code){
    const h = historyFor(code);
    return h.length > 1 ? h[h.length-2] : null;
  }
  function recordPrice(code, price){
    const list = priceHistory[code] ? priceHistory[code].slice() : [];
    const today = todayStr();
    const last = list[list.length-1];
    if(last && last.date === today){
      last.price = price;
    } else {
      list.push({date: today, price});
    }
    priceHistory[code] = list;
  }

  // ---------- Fetch live prices ----------
  async function fetchTodayPrices(){
    if(holdings.length === 0){
      setStatus('請先新增持股，再更新股價。', true);
      return;
    }
    setStatus('正在向證交所公開資訊擷取今日收盤價…', false);
    els.btnFetch.disabled = true;
    try{
      const res = await fetch('https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL');
      if(!res.ok) throw new Error('bad status');
      const data = await res.json();
      const byCode = {};
      data.forEach(row => { byCode[row.Code] = row; });

      let matched = 0;
      holdings.forEach(h => {
        const row = byCode[h.code];
        if(row){
          const price = parseFloat(String(row.ClosingPrice).replace(/,/g,''));
          if(!isNaN(price)){
            recordPrice(h.code, price);
            matched++;
          }
        }
      });

      if(matched === 0){
        setStatus('連線成功，但找不到對應的股票代號，請確認代號是否正確，或於下方手動輸入。', true);
      } else if(matched < holdings.length){
        setStatus(`已更新 ${matched} / ${holdings.length} 檔股票，其餘請於下方手動輸入今日收盤價。`, false);
      } else {
        setStatus(`已成功更新全部 ${matched} 檔股票的今日收盤價。`, false);
      }
      await savePriceHistory();
      recordPortfolioSnapshot();
      render();
    }catch(e){
      setStatus('目前無法自動連線取得股價（可能是網路限制），請於下方各檔股票卡片手動輸入今日收盤價。', true);
      render();
    }finally{
      els.btnFetch.disabled = false;
    }
  }

  function recordPortfolioSnapshot(){
    let value = 0;
    holdings.forEach(h=>{
      const le = latestEntry(h.code);
      value += (le ? le.price : h.avgCost) * h.shares;
    });
    const today = todayStr();
    const last = portfolioHistory[portfolioHistory.length-1];
    if(last && last.date === today){ last.value = value; }
    else { portfolioHistory.push({date: today, value}); }
    savePortfolioTrend();
  }

  // ---------- Rendering ----------
  function render(){
    renderSummary();
    renderTicker();
    renderCards();
    renderTrend();
    els.todayLabel.textContent = new Date().toLocaleDateString('zh-TW', {year:'numeric', month:'long', day:'numeric', weekday:'short'});
  }

  function renderSummary(){
    let value = 0, cost = 0;
    holdings.forEach(h=>{
      const le = latestEntry(h.code);
      const p = le ? le.price : h.avgCost;
      value += p * h.shares;
      cost += h.avgCost * h.shares;
    });
    const pnl = value - cost;
    const pct = cost > 0 ? (pnl/cost*100) : 0;
    els.sumValue.textContent = fmtMoney(value);
    els.sumCost.textContent = fmtMoney(cost);
    els.sumPnl.textContent = fmtMoney(pnl) + ' (' + fmtPct(pct) + ')';
    els.sumPnl.className = 'sum-value mono ' + (pnl > 0 ? 'pos' : pnl < 0 ? 'neg' : '');
  }

  function renderTicker(){
    if(holdings.length === 0){
      els.tickerTrack.innerHTML = '<div class="tick"><span class="code">尚未新增持股</span></div>';
      return;
    }
    const items = holdings.map(h=>{
      const le = latestEntry(h.code);
      const pe = prevEntry(h.code);
      const price = le ? le.price : null;
      const chg = (le && pe) ? le.price - pe.price : null;
      const dir = chg === null ? 'flat' : (chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat');
      const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '－';
      const priceTxt = price === null ? '—' : price.toFixed(2);
      const chgTxt = chg === null ? '' : (chg>=0?'+':'') + chg.toFixed(2);
      return `<div class="tick ${dir}"><span class="code mono">${h.code}</span><span class="px mono">${priceTxt}</span><span class="chg mono">${arrow} ${chgTxt}</span></div>`;
    });
    const html = items.join('') ;
    els.tickerTrack.innerHTML = html + html; // duplicate for seamless loop
  }

  function renderCards(){
    els.emptyState.style.display = holdings.length === 0 ? 'block' : 'none';
    els.cardsGrid.innerHTML = '';
    holdings.forEach(h=>{
      const le = latestEntry(h.code);
      const pe = prevEntry(h.code);
      const price = le ? le.price : null;
      const chg = (le && pe) ? le.price - pe.price : null;
      const chgPct = (chg !== null && pe.price !== 0) ? (chg/pe.price*100) : null;
      const dir = chg === null ? 'flat' : (chg > 0 ? 'up' : chg < 0 ? 'down' : 'flat');
      const arrow = dir === 'up' ? '▲' : dir === 'down' ? '▼' : '－';

      const curValue = (price !== null ? price : h.avgCost) * h.shares;
      const costValue = h.avgCost * h.shares;
      const pnl = curValue - costValue;
      const pnlPct = costValue > 0 ? (pnl/costValue*100) : 0;

      let alertHtml = '';
      if(price !== null){
        if(h.alertHigh && price >= h.alertHigh){
          alertHtml = `<div class="alert-badge">🔔 已達目標價 ${h.alertHigh}</div>`;
        } else if(h.alertLow && price <= h.alertLow){
          alertHtml = `<div class="alert-badge">🔔 已達停損價 ${h.alertLow}</div>`;
        }
      }

      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <div class="card-head">
          <div>
            <div class="card-code mono">${h.code}</div>
            <div class="card-name">${escapeHtml(h.name || h.code)}</div>
          </div>
          <div class="card-actions">
            <button class="icon-btn" data-edit="${h.id}" title="編輯" aria-label="編輯 ${h.code}">✎</button>
            <button class="icon-btn" data-del="${h.id}" title="刪除" aria-label="刪除 ${h.code}">🗑</button>
          </div>
        </div>
        ${alertHtml}
        <div class="price-row ${dir}">
          <div class="price mono">${price !== null ? price.toFixed(2) : '尚無報價'}</div>
          ${price !== null ? `<div class="chg mono">${arrow} ${chgPct !== null ? fmtPct(chgPct) : ''}</div>` : ''}
        </div>
        <div class="pnl-row">損益：<span class="amt ${pnl>=0?'pos':'neg'} mono">${fmtMoney(pnl)} (${fmtPct(pnlPct)})</span></div>
        <canvas class="spark" data-spark="${h.code}"></canvas>
        <div class="thresholds mono">
          <span>股數 ${h.shares.toLocaleString('en-US')}</span>
          <span>成本 ${h.avgCost}</span>
        </div>
        <div class="manual-entry">
          <input type="text" inputmode="decimal" placeholder="手動輸入今日收盤價" data-manual="${h.code}">
          <button class="btn-ghost btn-small" data-manual-save="${h.code}">儲存</button>
        </div>
      `;
      els.cardsGrid.appendChild(card);
    });

    // sparkline draw pass (after DOM insertion so canvas has layout size)
    requestAnimationFrame(()=>{
      document.querySelectorAll('canvas[data-spark]').forEach(cv=>{
        drawSparkline(cv, historyFor(cv.dataset.spark).map(e=>e.price));
      });
    });

    // wire up buttons
    els.cardsGrid.querySelectorAll('[data-edit]').forEach(b=>b.addEventListener('click', ()=>openEdit(b.dataset.edit)));
    els.cardsGrid.querySelectorAll('[data-del]').forEach(b=>b.addEventListener('click', ()=>deleteHolding(b.dataset.del)));
    els.cardsGrid.querySelectorAll('[data-manual-save]').forEach(b=>{
      b.addEventListener('click', async ()=>{
        const code = b.dataset.manualSave;
        const input = els.cardsGrid.querySelector(`input[data-manual="${code}"]`);
        const val = parseFloat(input.value);
        if(isNaN(val) || val <= 0){
          setStatus('請輸入有效的收盤價數字。', true);
          return;
        }
        recordPrice(code, val);
        await savePriceHistory();
        recordPortfolioSnapshot();
        setStatus(`已手動記錄 ${code} 今日收盤價 ${val}。`, false);
        render();
      });
    });
  }

  function drawSparkline(canvas, values){
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = canvas.clientWidth || 220;
    const hgt = canvas.clientHeight || 44;
    canvas.width = w * dpr;
    canvas.height = hgt * dpr;
    ctx.scale(dpr, dpr);
    ctx.clearRect(0,0,w,hgt);

    if(values.length < 2){
      ctx.fillStyle = 'rgba(138,144,166,0.5)';
      ctx.font = '11px "JetBrains Mono", monospace';
      ctx.fillText('累積更多天數以顯示走勢', 4, hgt/2 + 4);
      return;
    }
    const min = Math.min(...values), max = Math.max(...values);
    const range = (max - min) || 1;
    const pad = 4;
    const stepX = (w - pad*2) / (values.length - 1);
    const up = values[values.length-1] >= values[0];
    ctx.strokeStyle = up ? getCssVar('--rise') : getCssVar('--fall');
    ctx.lineWidth = 2;
    ctx.beginPath();
    values.forEach((v,i)=>{
      const x = pad + i*stepX;
      const y = hgt - pad - ((v - min)/range)*(hgt - pad*2);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();
  }

  function renderTrend(){
    const ctx = els.trendChart.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const w = els.trendChart.clientWidth || 600;
    const hgt = els.trendChart.clientHeight || 160;
    els.trendChart.width = w*dpr;
    els.trendChart.height = hgt*dpr;
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,w,hgt);

    if(portfolioHistory.length < 2){
      ctx.fillStyle = 'rgba(138,144,166,0.6)';
      ctx.font = '13px "Noto Sans TC", sans-serif';
      ctx.fillText('每天按一次「更新今日股價」，這裡就會慢慢畫出你的資產走勢。', 6, hgt/2);
      return;
    }
    const values = portfolioHistory.map(p=>p.value);
    const min = Math.min(...values), max = Math.max(...values);
    const range = (max-min) || 1;
    const padL = 6, padR = 6, padT = 12, padB = 22;
    const stepX = (w - padL - padR) / (values.length - 1);

    // gridline
    ctx.strokeStyle = 'rgba(237,239,243,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(padL, hgt-padB); ctx.lineTo(w-padR, hgt-padB);
    ctx.stroke();

    const up = values[values.length-1] >= values[0];
    ctx.strokeStyle = up ? getCssVar('--rise') : getCssVar('--fall');
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    portfolioHistory.forEach((p,i)=>{
      const x = padL + i*stepX;
      const y = padT + (hgt-padT-padB) - ((p.value-min)/range)*(hgt-padT-padB);
      if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
    });
    ctx.stroke();

    ctx.fillStyle = 'rgba(138,144,166,0.9)';
    ctx.font = '10.5px "JetBrains Mono", monospace';
    ctx.fillText(portfolioHistory[0].date, padL, hgt-6);
    const lastLabel = portfolioHistory[portfolioHistory.length-1].date;
    ctx.fillText(lastLabel, w - padR - ctx.measureText(lastLabel).width, hgt-6);
  }

  function getCssVar(name){
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }

  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ---------- Modal / form ----------
  function openAdd(){
    editingId = null;
    els.modalTitle.textContent = '新增持股';
    els.fCode.value = ''; els.fName.value = ''; els.fShares.value = '';
    els.fCost.value = ''; els.fHigh.value = ''; els.fLow.value = '';
    els.formError.textContent = '';
    els.overlay.classList.add('show');
    els.fCode.focus();
  }
  function openEdit(id){
    const h = holdings.find(x=>x.id===id);
    if(!h) return;
    editingId = id;
    els.modalTitle.textContent = '編輯持股';
    els.fCode.value = h.code; els.fName.value = h.name || '';
    els.fShares.value = h.shares; els.fCost.value = h.avgCost;
    els.fHigh.value = h.alertHigh ?? ''; els.fLow.value = h.alertLow ?? '';
    els.formError.textContent = '';
    els.overlay.classList.add('show');
  }
  function closeModal(){
    els.overlay.classList.remove('show');
  }
  async function saveForm(){
    const code = els.fCode.value.trim();
    const name = els.fName.value.trim();
    const shares = parseFloat(els.fShares.value);
    const cost = parseFloat(els.fCost.value);
    const high = els.fHigh.value.trim() === '' ? null : parseFloat(els.fHigh.value);
    const low = els.fLow.value.trim() === '' ? null : parseFloat(els.fLow.value);

    if(!code){ els.formError.textContent = '請輸入股票代號。'; return; }
    if(isNaN(shares) || shares <= 0){ els.formError.textContent = '請輸入有效的股數。'; return; }
    if(isNaN(cost) || cost <= 0){ els.formError.textContent = '請輸入有效的平均成本。'; return; }
    if(high !== null && isNaN(high)){ els.formError.textContent = '目標價格式不正確。'; return; }
    if(low !== null && isNaN(low)){ els.formError.textContent = '停損價格式不正確。'; return; }

    if(editingId){
      const h = holdings.find(x=>x.id===editingId);
      Object.assign(h, {code, name, shares, avgCost:cost, alertHigh:high, alertLow:low});
    } else {
      holdings.push({
        id: 'h_' + Date.now() + '_' + Math.random().toString(36).slice(2,7),
        code, name, shares, avgCost:cost, alertHigh:high, alertLow:low
      });
    }
    await saveHoldings();
    closeModal();
    setStatus('已儲存持股資料。', false);
    render();
  }
  async function deleteHolding(id){
    holdings = holdings.filter(h=>h.id!==id);
    await saveHoldings();
    render();
  }

  // ---------- Wire events ----------
  els.btnFetch.addEventListener('click', fetchTodayPrices);
  els.btnAdd.addEventListener('click', openAdd);
  els.btnCancel.addEventListener('click', closeModal);
  els.btnSave.addEventListener('click', saveForm);
  els.overlay.addEventListener('click', (e)=>{ if(e.target === els.overlay) closeModal(); });
  document.addEventListener('keydown', (e)=>{ if(e.key === 'Escape') closeModal(); });
  window.addEventListener('resize', ()=>{ render(); });

  // ---------- Init ----------
  (async function init(){
    await loadAll();
    render();
    if(holdings.length === 0){
      setStatus('歡迎使用！先新增你的第一檔持股吧。', false);
    }
  })();
})();
</script>
</body>
</html>
